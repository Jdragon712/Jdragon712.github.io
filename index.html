<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="color-scheme" content="light" />
  <title>Jdragon712 — AI 네이티브 빌더</title>
  <meta name="description" content="AI 협업으로 데이터 서비스·학습 교재·자동화를 설계하고 배포하는 Jdragon712의 포트폴리오" />
  <link rel="canonical" href="https://jdragon712.github.io/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/profile.css" />
  <script
    async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9196941060199524"
    crossorigin="anonymous"
  ></script>
</head>
<body>
  <header class="nav">
    <div class="nav__inner">
      <a class="nav__brand" href="/">Jdragon712</a>
      <nav class="nav__links" id="nav-links" aria-label="주요 링크"></nav>
    </div>
  </header>

  <main class="page">
    <section class="hero" aria-labelledby="hero-name">
      <div class="hero__content">
        <span class="hero__badge">
          <span class="hero__badge-dot" aria-hidden="true"></span>
          AI 네이티브 빌더
        </span>
        <h1 class="hero__name" id="hero-name">Jdragon712</h1>
        <p class="hero__tagline" id="hero-tagline"></p>
        <p class="hero__bio" id="hero-bio"></p>
      </div>
      <div class="hero__avatar" id="hero-avatar" aria-hidden="true">JD</div>
    </section>

    <section class="section" aria-label="핵심 지표">
      <div class="metrics" id="metrics"></div>
    </section>

    <section class="section" id="projects" aria-labelledby="projects-title">
      <div class="section__head">
        <span class="section__label">Projects</span>
        <h2 class="section__title" id="projects-title">공개 프로젝트</h2>
        <p class="section__desc">데이터 수집부터 배포·교재화까지, 실제로 운영 중인 결과물입니다.</p>
      </div>
      <div class="projects" id="projects-grid"></div>
      <p class="add-hint">새 프로젝트 추가: <code>data/profile.json</code>의 <code>projects</code> 배열에 항목을 넣으면 자동으로 카드가 생성됩니다.</p>
    </section>

    <section class="section" id="capabilities" aria-labelledby="capabilities-title">
      <div class="section__head">
        <span class="section__label">Capabilities</span>
        <h2 class="section__title" id="capabilities-title">AI 활용 역량</h2>
        <p class="section__desc">Grok·Hermes 에이전트와 MCP·자동화를 결합해 만드는 일의 범위입니다.</p>
      </div>
      <div class="capabilities" id="capabilities"></div>
    </section>

    <section class="section" id="workflow" aria-labelledby="workflow-title">
      <div class="section__head">
        <span class="section__label">Workflow</span>
        <h2 class="section__title" id="workflow-title">만드는 방식</h2>
        <p class="section__desc">아이디어에서 공개 서비스까지, AI와 함께 반복하는 4단계입니다.</p>
      </div>
      <div class="workflow" id="workflow"></div>
    </section>

    <footer class="foot">
      <p class="foot__copy" id="foot-copy"></p>
      <div class="foot__links" id="foot-links"></div>
    </footer>
  </main>

  <script src="js/profile.js"></script>
</body>
</html>
